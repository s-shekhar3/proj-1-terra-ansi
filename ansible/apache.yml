---
- name: Install and Start Apache on EC2
  hosts: all
  become: yes

  tasks:
    - name: Install Apache2 package
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Deploy a simple webpage
      copy:
        dest: /var/www/html/index.html
        content: |
          <html>
            <head><title>Automation</title></head>
            <body>
              <h1>Terraform + Ansible Automation Successful!</h1>
              <p>Deployed via Ansible</p>
            </body>
          </html>
      notify: Restart Apache

    - name: Ensure Apache service is running
      service:
        name: apache2
        state: started
        enabled: yes

  handlers:
    - name: Restart Apache
      service:
        name: apache2
        state: restarted